version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: prode_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prode_user
      POSTGRES_PASSWORD: prode_password
      POSTGRES_DB: prode_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
